<div class="moneyhash-additional-fields bg-white border border-gray-200 rounded-xl shadow-sm p-6 mb-6" data-bind="visible: visible">
    <div class="fields-container">
        <h3 class="text-xl font-bold text-gray-900 mb-3" data-bind="i18n: 'Additional Information Required'"></h3>
        <p class="text-gray-600 mb-6 bg-blue-50 border-l-4 border-blue-500 py-3 px-4 rounded" data-bind="i18n: 'Please provide the following information to complete your payment:'"></p>

        <!-- Grid container for fields -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <!-- ko foreach: fields -->
            <div class="field-row" data-bind="visible: $parent.isFieldVisible($data)">
                <div class="flex flex-col space-y-2" data-bind="css: { 'has-error': hasError() }">
                    <label class="text-sm font-medium text-gray-700" data-bind="attr: { for: 'moneyhash_' + name }">
                        <span data-bind="text: label"></span>
                        <!-- ko if: validation.required -->
                        <span class="text-red-500 ml-1">*</span>
                        <!-- /ko -->
                    </label>

                    <div class="flex flex-col space-y-1">
                        <!-- Text, Email, Number, Phone, Date -->
                        <!-- ko if: type === 'text' || type === 'email' || type === 'number' || type === 'phoneNumber' || type === 'date' -->
                        <input class="w-full px-3 py-2 border border-gray-300 rounded-md  focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200"
                               data-bind="
                                   attr: {
                                       id: 'moneyhash_' + name,
                                       name: name,
                                       type: type,
                                       placeholder: hint,
                                       readonly: readOnly
                                   },
                                   css: {
                                       'border-red-300 bg-red-50': hasError(),
                                       'bg-gray-100 cursor-not-allowed': readOnly
                                   },
                                   value: value,
                                   event: { change: function(data, event) { $parent.onFieldChange(data, event) } }
                               " />
                        <!-- /ko -->

                        <!-- Select Field -->
                        <!-- ko if: type === 'select' -->
                        <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200 appearance-none bg-white bg-[url('data:image/svg+xml;charset=US-ASCII,<svg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22><path%20fill%3D%22%23333%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F><%2Fsvg>')] bg-repeat bg-[right_0.75rem_center] bg-[length:16px_12px]"
                                data-bind="
                                    attr: {
                                        id: 'moneyhash_' + name,
                                        name: name,
                                        readonly: readOnly
                                    },
                                    css: {
                                        'border-red-300 bg-red-50': hasError(),
                                        'bg-gray-100 cursor-not-allowed': readOnly
                                    },
                                    value: value,
                                    event: { change: function(data, event) { $parent.onFieldChange(data, event) } },
                                    options: $parent.getSelectOptions($data),
                                    optionsText: 'label',
                                    optionsValue: 'value',
                                    optionsCaption: hint || 'Please select...'
                                "></select>
                        <!-- /ko -->

                        <!-- Field Hint -->
                        <!-- ko if: hint && type !== 'select' -->
                        <div class="text-xs text-gray-500 italic mt-1">
                            <span data-bind="text: hint"></span>
                        </div>
                        <!-- /ko -->

                        <!-- Error Message -->
                        <!-- ko if: hasError -->
                        <div class="text-sm text-red-600 bg-red-50 border-l-4 border-red-500 py-1 px-3 rounded">
                            <span data-bind="text: error"></span>
                        </div>
                        <!-- /ko -->
                    </div>
                </div>
            </div>
            <!-- /ko -->
        </div>

        <!-- Place Order Button inside the additional fields -->
        <div class="moneyhash-actions-toolbar border-t border-gray-200 pt-6 mt-6">
            <div class="flex justify-end">
                <button class="bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold py-3 px-8 rounded-lg shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                        type="submit"
                        data-bind="
                            click: placeOrderFromFields,
                            enable: isPlaceOrderActionAllowed() ,
                            attr: {title: $t('Complete Payment')}
                        ">
                    <span data-bind="i18n: 'Complete Payment'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
